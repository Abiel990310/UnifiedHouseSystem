# RuView Mosquitto configuration
# Placed in /etc/mosquitto/conf.d/ruview.conf

# Listen on all interfaces (only on local network — no auth needed for local use)
listener 1883 0.0.0.0

# Allow anonymous connections from ESP32-S3 nodes on local network
allow_anonymous true

# Persistence (keep retained node status messages across broker restart)
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection limits — conservative for Pi Zero 2 W
max_connections 20
max_inflight_messages 20
message_size_limit 65536

# Keep retained messages for 24 hours
# (node status messages are retained so hub gets them on reconnect)
